<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シリアル番号逆引きツール</title>
  <style>
    body { font-family: Meiryo, sans-serif; background: #1a3a5c; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border-radius: 12px; padding: 40px 48px; text-align: center; max-width: 380px; }
    h1 { color: #1a3a5c; font-size: 1.1rem; margin-bottom: 20px; }
    button { display: inline-block; padding: 14px 36px; background: #1a3a5c; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-family: Meiryo, sans-serif; cursor: pointer; }
    button:hover { background: #254f7a; }
  </style>
</head>
<body>
<div class="box">
  <h1>シリアル番号逆引きツール</h1>
  <button onclick="launch()">ツールを開く</button>
</div>
<script>
function launch() {
  window.open('./index.html', '_blank');
  setTimeout(function() { history.back(); }, 100);
}
</script>
</body>
</html>
